<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: #0f1117;
            color: white;
            font-family: -apple-system, Inter, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }

        h1 {
            font-size: 36px;
            font-weight: 700;
            color: #e2e8f0;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 15px;
            color: #64748b;
        }

        .hint {
            font-size: 13px;
            color: #334155;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <h1>EclipseX</h1>
    <p>Enter a URL in the bar above to get started.</p>
    <span class="hint">Press Z to leave &nbsp;·&nbsp; Tab to focus iframe</span>
</body>
</html>
